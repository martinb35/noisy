<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="theme-color" content="#1a1a2e">
  <title>Noisy — White Noise &amp; Signal Composer</title>
  <link rel="stylesheet" href="css/styles.css">
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="icons/icon-192.png">
</head>
<body>
  <!-- ===== Top navigation tabs ===== -->
  <nav id="tab-bar">
    <button class="tab active" data-tab="noise">Noise</button>
    <button class="tab" data-tab="composer">Composer</button>
    <button class="tab" data-tab="clock">Clock</button>
  </nav>

  <!-- ===== Noise panel ===== -->
  <section id="panel-noise" class="panel active">
    <h2>Noise Generator</h2>
    <div class="control-group">
      <label for="noise-type">Type</label>
      <select id="noise-type">
        <option value="white">White Noise</option>
        <option value="brown">Brown Noise</option>
      </select>
    </div>
    <div class="control-group">
      <label for="noise-volume">Volume</label>
      <input type="range" id="noise-volume" min="0" max="1" step="0.01" value="0.5">
      <span id="noise-volume-label">50%</span>
    </div>
    <div class="control-group">
      <button id="noise-play" class="btn-primary">▶ Play</button>
    </div>
    <canvas id="noise-canvas" width="800" height="200"></canvas>
  </section>

  <!-- ===== Composer panel ===== -->
  <section id="panel-composer" class="panel">
    <h2>Sine Wave Composer</h2>
    <div class="viz-toggle">
      <button id="viz-waveform" class="btn-sm active">Waveform</button>
      <button id="viz-fft" class="btn-sm">FFT</button>
    </div>
    <canvas id="viz-canvas" width="800" height="200"></canvas>
    <div class="control-group">
      <button id="composer-play" class="btn-primary">▶ Play</button>
      <label for="composer-volume">Master</label>
      <input type="range" id="composer-volume" min="0" max="1" step="0.01" value="0.3">
      <span id="composer-volume-label">30%</span>
    </div>
    <div id="sine-sliders"></div>
  </section>

  <!-- ===== Night-mode clock overlay ===== -->
  <section id="panel-clock" class="panel">
    <div class="clock-settings">
      <div class="control-group">
        <label for="clock-brightness">Brightness</label>
        <input type="range" id="clock-brightness" min="0.05" max="1" step="0.05" value="0.6">
      </div>
      <button id="clock-fullscreen" class="btn-primary">Enter Full Screen</button>
    </div>
  </section>

  <div id="clock-overlay" class="hidden">
    <div id="clock-display">00:00</div>
    <div id="clock-exit-hint">tap to exit</div>
  </div>

  <script type="module" src="js/main.js"></script>
  <script>
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('sw.js');
    }
  </script>
</body>
</html>
